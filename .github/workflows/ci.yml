name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25.7"
  GOLANGCI_LINT_VERSION: "v2.10.1"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      release: ${{ steps.filter.outputs.release }}
      nix: ${{ steps.filter.outputs.nix }}
      integration: ${{ steps.filter.outputs.integration }}
      e2e: ${{ steps.filter.outputs.e2e }}
      profiling: ${{ steps.filter.outputs.profiling }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
              - 'scripts/**'
            release:
              - '.goreleaser.yml'
              - '.github/workflows/release.yml'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
            integration:
              - 'cmd/**'
              - 'internal/**'
              - 'test/integration/**'
              - 'testdata/**'
              - 'go.mod'
              - 'go.sum'
            e2e:
              - 'cmd/**'
              - 'internal/**'
              - 'test/e2e/**'
              - 'testdata/**'
              - 'go.mod'
              - 'go.sum'
            profiling:
              - 'internal/profile/**'

  generate:
    name: Generate Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.nix == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Run generators
        run: just generate

      - name: Verify generated files are committed
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            git diff --stat
            echo "::error::Generated files are out of date. Run 'just generate' and commit the changes."
            exit 1
          fi

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Setup golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint
        run: |
          BASE_REV=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m --new-from-rev="$BASE_REV" ./...

      - name: Build
        run: go build ./...

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Race tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Security
        continue-on-error: true
        run: govulncheck ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out
          if-no-files-found: error

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Run integration tests
        run: go test -tags=integration ./test/integration

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Run e2e tests
        run: go test -tags=e2e ./test/e2e

  profiling:
    name: Profiling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.profiling == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run profiling tests
        run: go test -run '^TestProfiler' ./internal/profile

  release-config:
    name: Release Config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Validate GoReleaser config
        run: go run github.com/goreleaser/goreleaser/v2@v2.12.7 check

      - name: Snapshot build (no publish)
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/goreleaser/goreleaser-cross@sha256:376c5aee1ead08141b106268f1c136e17920cc0c58a0bf009e6eb37e5fae50c5 \
            build --snapshot --clean

  nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.nix == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Check flake
        run: nix flake check

      - name: Build package
        run: nix build .#lazytf
