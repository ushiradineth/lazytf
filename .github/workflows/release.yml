name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GORELEASER_CROSS_IMAGE: ghcr.io/goreleaser/goreleaser-cross@sha256:376c5aee1ead08141b106268f1c136e17920cc0c58a0bf009e6eb37e5fae50c5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch
        env:
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release must run from $DEFAULT_BRANCH, got $REF_NAME"
            exit 1
          fi

      - name: Validate tag availability
        id: validate_tag
        run: |
          latestTag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$latestTag" ]; then
            latestTag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)
          fi
          if [ -z "$latestTag" ]; then
            latestTag=v0.0.0
          fi
          if [[ ! "$latestTag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Latest tag must be semver (vX.Y.Z), got: $latestTag"
            exit 1
          fi
          echo "Resolved latest tag: $latestTag"
          echo "latest_tag=$latestTag" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: prep
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
          LATEST_TAG: ${{ steps.validate_tag.outputs.latest_tag }}
        run: |
          set -euo pipefail

          latest_version="${LATEST_TAG#v}"

          current_version=$(sed -n 's/^var Version = "\([^"]*\)"$/\1/p' internal/consts/consts.go)
          if [ -z "$current_version" ]; then
            echo "Failed to read current version from internal/consts/consts.go"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$latest_version"

          case "$VERSION_BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $VERSION_BUMP"
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          if [ "$current_version" != "$latest_version" ] && [ "$current_version" != "$next_version" ]; then
            echo "internal/consts/consts.go version $current_version must match latest tag $LATEST_TAG or next version $next_version before release"
            exit 1
          fi

          should_bump=true
          if [ "$current_version" = "$next_version" ]; then
            should_bump=false
          fi

          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "should_bump=$should_bump" >> "$GITHUB_OUTPUT"

      - name: Commit and tag locally
        env:
          TAG: ${{ steps.prep.outputs.tag }}
          VERSION: ${{ steps.prep.outputs.version }}
          SHOULD_BUMP: ${{ steps.prep.outputs.should_bump }}
        run: |
          set -euo pipefail

          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG}")" ]; then
            echo "Tag ${TAG} already exists on origin"
            exit 1
          fi

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally"
            exit 1
          fi

          if [ "$SHOULD_BUMP" = "true" ]; then
            sed -i 's/^var Version = ".*"$/var Version = "'"$VERSION"'"/' internal/consts/consts.go
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add internal/consts/consts.go
            git commit -m "chore(release): bump version to ${VERSION}"
          else
            echo "Version already at ${VERSION} on branch head, skipping bump commit"
          fi

          git tag "${TAG}"

      - name: Push commit and tag
        env:
          TAG: ${{ steps.prep.outputs.tag }}
          SHOULD_BUMP: ${{ steps.prep.outputs.should_bump }}
        run: |
          set -euo pipefail

          if [ "$SHOULD_BUMP" = "true" ]; then
            git push origin HEAD
          else
            echo "Skipping branch push because bump commit is already present on head"
          fi

          git push origin "${TAG}"

      - name: Cleanup on failure
        if: failure()
        run: |
          git reset --hard HEAD~1 || true
          git tag -d ${{ steps.prep.outputs.tag }} 2>/dev/null || true

      - name: Checkout release tag
        run: git checkout "${{ steps.prep.outputs.tag }}"

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.12.7
          install-only: true

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.prep.outputs.tag }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_GITHUB_TOKEN \
            -e GORELEASER_CURRENT_TAG \
            -v "$PWD:/work" \
            -w /work \
            "$GORELEASER_CROSS_IMAGE" \
            release --clean

      - name: Show release URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.prep.outputs.tag }}" --json url --jq .url
