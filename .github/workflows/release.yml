name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      publish_tag:
        description: "Optional existing tag to publish (e.g. v1.2.3)"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Open release PR
    if: github.event_name == 'workflow_dispatch' && inputs.publish_tag == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref }}

      - name: Validate branch
        env:
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release PR must run from $DEFAULT_BRANCH, got $REF_NAME"
            exit 1
          fi

      - name: Bump version in source
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          set -euo pipefail

          current_version=$(sed -n 's/^var Version = "\([^"]*\)"$/\1/p' internal/consts/consts.go)
          if [ -z "$current_version" ]; then
            echo "Failed to read current version from internal/consts/consts.go"
            exit 1
          fi
          if [[ ! "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version must be semver (X.Y.Z), got: $current_version"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$VERSION_BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $VERSION_BUMP"
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          sed -i 's/^var Version = ".*"$/var Version = "'"$next_version"'"/' internal/consts/consts.go

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.bump.outputs.next_version }}
          delete-branch: true
          commit-message: "chore(release): bump version to ${{ steps.bump.outputs.next_version }}"
          title: "chore(release): bump version to ${{ steps.bump.outputs.next_version }}"
          body: |
            ## Release prep

            - bumps `internal/consts/consts.go` from `${{ steps.bump.outputs.current_version }}` to `${{ steps.bump.outputs.next_version }}`
            - after this PR merges to `main`, CI will create tag `v${{ steps.bump.outputs.next_version }}` and publish the release
          labels: release
          base: ${{ github.ref_name }}
          signoff: true

      - name: Show release PR URL
        if: steps.cpr.outputs.pull-request-url != ''
        run: echo "${{ steps.cpr.outputs.pull-request-url }}"

  tag-release:
    name: Tag merged release commit
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag for release bump
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          version=$(sed -n 's/^var Version = "\([^"]*\)"$/\1/p' internal/consts/consts.go)
          if [ -z "$version" ]; then
            echo "Failed to read version from internal/consts/consts.go"
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be semver (X.Y.Z), got: $version"
            exit 1
          fi

          tag="v${version}"

          if [ -n "$(git ls-remote --tags origin "refs/tags/${tag}")" ]; then
            echo "Tag ${tag} already exists on origin, skipping"
            exit 0
          fi

          if ! git diff-tree -m --no-commit-id --name-only -r "$GITHUB_SHA" | grep -q '^internal/consts/consts.go$'; then
            echo "No version file update in this commit, skipping tag creation"
            exit 0
          fi

          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"

  release:
    name: Build and release
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish_tag != '')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GORELEASER_CROSS_IMAGE: ghcr.io/goreleaser/goreleaser-cross@sha256:376c5aee1ead08141b106268f1c136e17920cc0c58a0bf009e6eb37e5fae50c5
      GORELEASER_CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref }}

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.12.7
          install-only: true

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_GITHUB_TOKEN \
            -e GORELEASER_CURRENT_TAG \
            -v "$PWD:/work" \
            -w /work \
            "$GORELEASER_CROSS_IMAGE" \
            release --clean

      - name: Show release URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$GORELEASER_CURRENT_TAG" --json url --jq .url
