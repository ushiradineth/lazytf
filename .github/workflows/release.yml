name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Open release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate branch
        env:
          REF_NAME: ${{ github.ref_name }}
          MAIN_BRANCH: main
        run: |
          if [ "$REF_NAME" != "$MAIN_BRANCH" ]; then
            echo "Release PR must run from $MAIN_BRANCH, got $REF_NAME"
            exit 1
          fi

      - name: Bump version in source
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          set -euo pipefail

          current_version=$(tr -d '[:space:]' < VERSION)
          if [ -z "$current_version" ]; then
            echo "Failed to read current version from VERSION"
            exit 1
          fi
          if [[ ! "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version must be semver (X.Y.Z), got: $current_version"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$VERSION_BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $VERSION_BUMP"
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          printf '%s\n' "$next_version" > VERSION

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate generated assets
        run: go generate ./...

      - name: Create release PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.bump.outputs.next_version }}
          delete-branch: true
          author: Ushira Dineth <ushiradineth@gmail.com>
          committer: Ushira Dineth <ushiradineth@gmail.com>
          commit-message: "chore(release): bump version to ${{ steps.bump.outputs.next_version }}"
          title: "chore(release): bump version to ${{ steps.bump.outputs.next_version }}"
          body: |
            ## Release prep

            - bumps `VERSION` from `${{ steps.bump.outputs.current_version }}` to `${{ steps.bump.outputs.next_version }}`
            - regenerates versioned config artifacts via `go generate ./...` so generated files match the bumped `VERSION`
            - after this PR merges to `main`, CI will create tag `v${{ steps.bump.outputs.next_version }}` and publish the release
          labels: release
          base: main
          signoff: true

      - name: Show release PR URL
        if: steps.cpr.outputs.pull-request-url != ''
        run: echo "${{ steps.cpr.outputs.pull-request-url }}"

  tag-release:
    name: Tag merged release commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create and push tag for release bump
        id: create_tag
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo "release_tag=" >> "$GITHUB_OUTPUT"

          version=$(tr -d '[:space:]' < VERSION)
          if [ -z "$version" ]; then
            echo "Failed to read version from VERSION"
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be semver (X.Y.Z), got: $version"
            exit 1
          fi

          tag="v${version}"

          if [ -n "$(git ls-remote --tags origin "refs/tags/${tag}")" ]; then
            echo "Tag ${tag} already exists on origin, skipping"
            exit 0
          fi

          if ! git diff-tree -m --no-commit-id --name-only -r "$GITHUB_SHA" | grep -q '^VERSION$'; then
            echo "No VERSION update in this commit, skipping tag creation"
            exit 0
          fi

          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Setup GoReleaser
        if: steps.create_tag.outputs.release_tag != ''
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.12.7
          install-only: true

      - name: Validate GoReleaser config
        if: steps.create_tag.outputs.release_tag != ''
        run: goreleaser check

      - name: Release from newly pushed tag
        if: steps.create_tag.outputs.release_tag != ''
        env:
          GORELEASER_CROSS_IMAGE: ghcr.io/goreleaser/goreleaser-cross@sha256:376c5aee1ead08141b106268f1c136e17920cc0c58a0bf009e6eb37e5fae50c5
          GORELEASER_CURRENT_TAG: ${{ steps.create_tag.outputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_GITHUB_TOKEN \
            -e GORELEASER_CURRENT_TAG \
            -v "$PWD:/work" \
            -w /work \
            "$GORELEASER_CROSS_IMAGE" \
            release --clean

      - name: Show release URL
        if: steps.create_tag.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.create_tag.outputs.release_tag }}
        run: gh release view "$GORELEASER_CURRENT_TAG" --json url --jq .url
