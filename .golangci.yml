# golangci-lint configuration v2
# Comprehensive linting for code quality, security, and maintainability
version: "2"

run:
  # Timeout for analysis
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    # ===== Default/Essential =====
    - errcheck        # Check for unchecked errors
    - govet           # Go vet examines source code
    - ineffassign     # Detect unused variable assignments
    - staticcheck     # Comprehensive static analysis
    - unused          # Check for unused code

    # ===== Error Handling =====
    - errorlint       # Error wrapping issues (Go 1.13+)
    - nilerr          # Returns nil when error is not nil
    - nilnil          # Simultaneous nil error and nil value

    # ===== Code Quality =====
    - gocritic        # Bugs, performance, style issues
    - revive          # Fast, configurable linter (golint replacement)
    - misspell        # Common spelling mistakes
    - dupword         # Duplicate words in comments/strings
    - whitespace      # Unnecessary newlines

    # ===== Security =====
    - gosec           # Security problems

    # ===== Complexity & Maintainability =====
    - gocyclo         # Cyclomatic complexity
    - gocognit        # Cognitive complexity
    - funlen          # Function length limits
    - nestif          # Deeply nested if statements
    - maintidx        # Maintainability index

    # ===== Code Duplication & Constants =====
    - dupl            # Code duplication detection
    - goconst         # Repeated strings -> constants

    # ===== Performance =====
    - perfsprint      # Faster fmt.Sprintf alternatives
    - prealloc        # Slice preallocation suggestions
    - bodyclose       # HTTP response body closure

    # ===== Style & Conventions =====
    - godot           # Comments end with period
    - godox           # TODO/FIXME/BUG detection
    - nakedret        # Naked returns in long functions
    - unconvert       # Unnecessary type conversions
    - usestdlibvars   # Use stdlib variables/constants

    # ===== Testing =====
    - testifylint     # Testify usage checks
    - thelper         # Test helper t.Helper() usage
    - tparallel       # t.Parallel() usage
    - usetesting      # Testing package replacements

    # ===== Imports & Dependencies =====
    - importas        # Consistent import aliases
    - gomodguard      # Module blocklist/allowlist
    - exptostd        # x/exp -> stdlib replacements
    - noctx           # Missing context.Context usage

    # ===== Type Safety =====
    - forcetypeassert # Forced type assertions
    - exhaustive      # Exhaustive enum switch

    # ===== Additional Checks =====
    - unparam         # Unused function parameters
    - asciicheck      # Non-ASCII identifiers
    - bidichk         # Dangerous unicode sequences
    - durationcheck   # Duration multiplication issues
    - nosprintfhostport # URL host:port construction
    - reassign        # Package variable reassignment
    - wastedassign    # Wasted assignments

    # ===== Unused Code Detection =====
    - dogsled         # Check for too many blank identifiers (_, _, _ = ...)
    - nolintlint      # Validates nolint directives are necessary

  exclusions:
    rules:
      - linters:
          - unparam
        path: (.+)_test\.go

      # Allow longer functions in test files
      - linters:
          - funlen
          - gocognit
          - gocyclo
        path: (.+)_test\.go

      # Allow TODO comments in test files
      - linters:
          - godox
        path: (.+)_test\.go

      # Allow duplication in test files (test cases often similar)
      - linters:
          - dupl
        path: (.+)_test\.go

      # Allow repeated strings in test files (test data)
      - linters:
          - goconst
        path: (.+)_test\.go

      # Allow unused parameters/receivers in test files (common pattern for test helpers)
      - linters:
          - revive
        path: (.+)_test\.go
        text: "unused-parameter|unused-receiver"

      # Allow test helper functions without t.Helper() in test files
      - linters:
          - thelper
        path: (.+)_test\.go

      # Allow utils package name (common Go pattern)
      - linters:
          - revive
        path: internal/utils/
        text: "var-naming: avoid meaningless package names"

    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

    warn-unused: true

  settings:
    # ===== Complexity Settings =====
    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    funlen:
      lines: 80
      statements: 50
      ignore-comments: true

    nestif:
      min-complexity: 5

    maintidx:
      under: 20  # Flag functions with maintainability index under 20

    # ===== Duplication Settings =====
    dupl:
      threshold: 100  # Minimum tokens for duplication detection

    # ===== Constants Settings =====
    goconst:
      min-len: 3           # Minimum string length
      min-occurrences: 3   # Minimum occurrences before suggesting constant

    # ===== Security Settings =====
    gosec:
      excludes:
        - G104  # Audit errors not checked (covered by errcheck)
        - G304  # File path provided as taint input (common in CLI apps)
      config:
        global:
          audit: true

    # ===== Style Settings =====
    godot:
      scope: declarations  # Only check exported declaration comments
      period: true

    godox:
      keywords:
        - TODO
        - FIXME
        - BUG
        - HACK
        - OPTIMIZE
        - XXX

    nakedret:
      max-func-lines: 30

    # ===== Prealloc Settings =====
    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    # ===== Exhaustive Settings =====
    exhaustive:
      default-signifies-exhaustive: true

    # ===== gocritic Settings =====
    gocritic:
      enable-all: true
      disabled-checks:
        - appendAssign
        - appendCombine
        - assignOp
        - commentedOutCode
        - deferInLoop
        - exitAfterDefer
        - hugeParam
        - importShadow
        - paramTypeCombine
        - rangeValCopy
        - tooManyResultsChecker
        - unnamedResult
        - whyNoLint

    # ===== gomodguard Settings =====
    gomodguard:
      blocked:
        modules:
          - github.com/golang-jwt/jwt/v4:
              recommendations:
                - github.com/golang-jwt/jwt/v5

          - github.com/imdario/mergo:
              recommendations:
                - dario.cat/mergo
              reason: '`github.com/imdario/mergo` has been renamed.'

          - github.com/pkg/errors:
              recommendations:
                - errors

    # ===== govet Settings =====
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true

    # ===== importas Settings =====
    importas:
      alias:
        - pkg: k8s.io/api/apps/v1
          alias: appsv1

        - pkg: k8s.io/api/core/v1
          alias: corev1

        - pkg: k8s.io/api/rbac/v1
          alias: rbacv1

        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: apierrors

        - pkg: k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1
          alias: apiextensionsv1

        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1

        - pkg: k8s.io/client-go/informers/core/v1
          alias: informersv1

        - pkg: errors
          alias: stderrors

        - pkg: github.com/charmbracelet/bubbletea
          alias: tea

    # ===== nolintlint Settings =====
    nolintlint:
      require-specific: true

    # ===== perfsprint Settings =====
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

    # ===== revive Settings =====
    revive:
      rules:
        - name: bool-literal-in-expr

        - name: blank-imports
          disabled: true

        - name: context-as-argument
          arguments:
            - allowTypesBefore: '*testing.T,testing.TB'

        - name: context-keys-type
          disabled: true

        - name: dot-imports
          disabled: true

        - name: duplicated-imports

        - name: early-return
          arguments:
            - preserveScope

        - name: empty-block
          disabled: true

        - name: error-naming
          disabled: true

        - name: error-return

        - name: error-strings
          disabled: true

        - name: errorf

        - name: identical-branches

        - name: if-return

        - name: increment-decrement

        - name: indent-error-flow
          arguments:
            - preserveScope

        - name: modifies-parameter

        - name: optimize-operands-order

        - name: range

        - name: receiver-naming

        - name: redefines-builtin-id
          disabled: true

        - name: redundant-import-alias

        - name: superfluous-else
          arguments:
            - preserveScope

        - name: time-equal

        - name: time-naming
          disabled: true

        - name: unexported-return
          disabled: true

        - name: unnecessary-stmt

        - name: unreachable-code

        - name: unused-parameter

        - name: use-any

        - name: useless-break

        - name: unused-receiver
          disabled: true  # Many methods implement interfaces but don't use receiver

        - name: var-declaration

        - name: var-naming
          arguments:
            - ["ID"]
            - ["VM"]

    # ===== staticcheck Settings =====
    staticcheck:
      checks:
        - all
        - -SA5011  # Possible nil pointer dereference
        - -ST1003  # Poorly chosen identifier
        - -ST1016  # Use consistent method receiver names

    # ===== testifylint Settings =====
    testifylint:
      enable-all: true
      disable:
        - go-require

    # ===== unused Settings =====
    unused:
      field-writes-are-uses: false
      post-statements-are-reads: false
      exported-fields-are-used: false
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: false

    # ===== dogsled Settings =====
    dogsled:
      max-blank-identifiers: 4  # Allow at most 4 blank identifiers (lipgloss.GetBorder returns 5 values)

    # ===== usetesting Settings =====
    usetesting:
      os-mkdir-temp: false

output:
  show-stats: true
